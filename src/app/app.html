
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bootstrap 5 Sidebar</title>

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <style>
    body {
      margin: 0;
      padding: 0;
    }

    /* === SIDEBAR STYLE === */
    .sidebar {
      width: 200px;
      height: 100vh;
      position: fixed;
      top: 0;
      left: 0;
      background-color: #212529;
      padding-top: 20px;
    }

    .sidebar .nav-link {
      color: white;
      padding: 12px 20px;
      display: block;
    }

    .sidebar .nav-link:hover {
      background-color: #343a40;
      color: #0d6efd;
    }

    /* === MAIN CONTENT AREA === */
    .content {
      margin-left: 250px;
      padding: 20px;
    }

    .sidebar-title {
      color: white;
      text-align: center;
      margin-bottom: 20px;
      font-size: 1.5rem;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <!-- ===================== -->
  <!-- ===== SIDEBAR ======= -->
  <!-- ===================== -->
  <div class="sidebar">

    <!-- Sidebar title -->
    <div class="sidebar-title">My Sidebar</div>

    <!-- Sidebar navigation links -->
    <nav class="nav flex-column">
      <a routerLink="/databinding" class="nav-link" >Data binding</a>
      <a routerLink="/signal" class="nav-link" >Signals</a>
      <a routerLink="/variables" class="nav-link">Variables</a>
      <a routerLink="/control-flow"  class="nav-link" >Control Flow</a>
      <a routerLink="/dynamic-css-class"  class="nav-link" >Dynamic CSS Class</a>
      <a class="nav-link" href="#">Contact</a>
    </nav>

  </div>
  <!-- ===== END SIDEBAR ===== -->


  <!-- ===================== -->
  <!-- ===== PAGE CONTENT === -->
  <!-- ===================== -->
  <div class="content">
<router-outlet></router-outlet>
  </div>


  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
