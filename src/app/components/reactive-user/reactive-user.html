<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>User Form</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-light">
    <div class="container mt-5">
      <div class="row justify-content-center">
        <div class="col-md-6">
          <div class="card shadow">
            <div class="card-header text-center">
              <h4>User Registration</h4>
            </div>

            <div class="card-body">
              <form [formGroup]="userForm">
                <div class="mb-3">
                  <label class="form-label">Name</label>
                  <input
                    type="text"
                    required
                    minlength="5"
                    class="form-control"
                    formControlName="name"
                  />
                  @if (userForm.controls['name'].touched || userForm.controls['name'].dirty) {
                    <div class="text-danger">
                      @if (userForm.controls['name'].errors?.['required']) {
                        <span>This is Required</span>

                      } @else if (userForm.controls['name'].errors?.['minlength']) {
                        <span>Min 5 char needed</span>
                      }
                    </div>
                  }
                </div>

                <div class="mb-3">
                  <label class="form-label">Username</label>
                  <input type="text" class="form-control" formControlName="userName" />
                </div>

                <div class="mb-3">
                  <label class="form-label">Email</label>
                  <input type="email" class="form-control" formControlName="email" />
                </div>

                <div class="mb-3">
                  <label class="form-label">Password</label>
                  <input type="password" class="form-control" formControlName="password" />
                </div>

                <div class="d-grid">
                  <button type="submit" [disabled]="userForm.invalid" class="btn btn-primary">Submit</button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
